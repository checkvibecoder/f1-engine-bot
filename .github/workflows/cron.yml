name: F1 Web Test

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: python bot.py

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Update page [skip ci]" || echo "No changes"
          git push
